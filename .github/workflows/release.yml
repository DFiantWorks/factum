name: Release

# Publishes the factum modules to Maven Central (Sonatype Central Portal). The
# version comes from the pushed tag via VcsVersionModule, so cut a release by
# tagging:
#
#   git tag 0.1.0 && git push origin 0.1.0
#
# Requires four repository secrets (Settings -> Secrets and variables -> Actions),
# generated once via `./mill mill.javalib.SonatypeCentralPublishModule/initGpgKeys`
# and a user token from https://central.sonatype.com/usertoken:
#   MILL_PGP_SECRET_BASE64, MILL_PGP_PASSPHRASE,
#   MILL_SONATYPE_USERNAME, MILL_SONATYPE_PASSWORD

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # VcsVersionModule derives publishVersion from the tag history, so the full
          # history and all tags are required; a shallow checkout would version the
          # build as 0.0.0-... instead of the released tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Publish to Sonatype Maven Central
        run: ./mill mill.javalib.SonatypeCentralPublishModule/
        env:
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
          MILL_SONATYPE_USERNAME: ${{ secrets.MILL_SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.MILL_SONATYPE_PASSWORD }}

  # Block downstream jobs until the freshly published artifact is actually
  # resolvable on Maven Central. Both README sync and the GitHub release promotion
  # gate on this, so the wait runs once and neither acts on a release that isn't
  # live yet. Gated on a real tag push (skipped for workflow_dispatch, where there
  # is no released version to point at).
  await-maven:
    name: wait for Maven Central
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the release to be resolvable on Maven Central
        shell: bash
        run: |
          # Poll the repository directly (repo1.maven.org), NOT the search index
          # (search.maven.org), which can lag the actual artifact by tens of minutes.
          VERSION="${GITHUB_REF_NAME#v}"
          POM="https://repo1.maven.org/maven2/io/github/dfiantworks/factum-core_3/${VERSION}/factum-core_3-${VERSION}.pom"
          echo "Polling $POM"
          for i in $(seq 1 60); do
            if curl -sfI "$POM" >/dev/null; then
              echo "available after attempt ${i}"
              exit 0
            fi
            echo "not yet (attempt ${i}/60), sleeping 60s"
            sleep 60
          done
          echo "timed out waiting for $POM" >&2
          exit 1

  # Promote the pushed tag to a published GitHub release, with auto-generated
  # release notes, only after the Maven artifact is confirmed live, so the
  # release announcement never points at a version users can't yet resolve.
  github-release:
    name: promote tag to GitHub release
    needs: await-maven
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create the GitHub release for the tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Idempotent: re-running the workflow on an already-released tag is a no-op
          # rather than a failure.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release ${TAG} already exists; nothing to do"
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes \
            --latest

  # Once the release is actually resolvable on Maven Central, rewrite the version
  # strings in the README so the documented dependency coordinates always match the
  # newest release; no manual bump.
  update-readme:
    name: sync README version
    needs: await-maven
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Commit the bump onto main, not the detached tag ref.
          ref: main

      - name: Rewrite the documented version in README
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Both dependency syntaxes carry the version. Anchor each replacement to
          # the factum-<module> coordinate so nothing else is ever touched.
          sed -i -E \
            -e "s|(factum-[a-z-]+::)[0-9][0-9.]*|\1${VERSION}|g" \
            -e "s|(\"factum-[a-z-]+\" % \")[0-9][0-9.]*(\")|\1${VERSION}\2|g" \
            README.md

      - name: Commit and push if the README changed
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "README already on ${GITHUB_REF_NAME#v}; nothing to do"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "docs: sync README to ${GITHUB_REF_NAME#v} [skip ci]"
          git push origin HEAD:main
